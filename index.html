<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>VenueConnect – Book Wedding & Event Venues in Gujarat | Ahmedabad, Surat, Rajkot, Vadodara</title>
    <meta name="description" content="Find and book the best wedding venues, banquet halls, party plots & event spaces in Gujarat. Compare prices, capacity, catering options for venues in Ahmedabad, Surat, Rajkot, Vadodara and across Gujarat." />
    <meta name="keywords" content="wedding venues Gujarat, banquet hall Ahmedabad, party plot Surat, event venue Rajkot, marriage hall Vadodara, farmhouse wedding Gujarat, corporate event venue Gujarat, birthday party venues Gujarat, wedding reception hall, venue booking Gujarat" />
    <meta name="author" content="VenueConnect" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://venueconnect.in/" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="IN-GJ" />
    <meta name="geo.placename" content="Gujarat, India" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://venueconnect.in/" />
    <meta property="og:title" content="VenueConnect – Best Wedding & Event Venues in Gujarat" />
    <meta property="og:description" content="Discover and book premium wedding venues, banquet halls and party plots across Gujarat. Venues in Ahmedabad, Surat, Rajkot, Vadodara and 50+ cities." />
    <meta property="og:image" content="https://venueconnect.in/og-image.jpg" />
    <meta property="og:site_name" content="VenueConnect" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VenueConnect" />
    <meta name="twitter:title" content="VenueConnect – Book Event Venues in Gujarat" />
    <meta name="twitter:description" content="Find the perfect wedding hall, banquet, farmhouse or party plot in Gujarat." />
    <meta name="twitter:image" content="https://venueconnect.in/og-image.jpg" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "VenueConnect",
      "url": "https://venueconnect.in",
      "description": "Gujarat's premier venue discovery and booking platform for weddings, corporate events, and celebrations.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://venueconnect.in/venues?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "VenueConnect",
      "url": "https://venueconnect.in",
      "logo": "https://venueconnect.in/logo.webp",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9601015102",
        "contactType": "customer service",
        "availableLanguage": ["English", "Gujarati", "Hindi"]
      },
      "areaServed": {
        "@type": "State",
        "name": "Gujarat",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.instagram.com/venueconnect",
        "https://www.facebook.com/venueconnect"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
